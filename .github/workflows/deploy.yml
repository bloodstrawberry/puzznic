name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master # 기준 브랜치 (master) 유지
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24" # 명시하신 Node 24 버전 유지
          cache: "yarn"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build with Next.js
        run: yarn build
        env:
          # 여기서 /puzznic 경로를 넘겨줍니다.
          NEXT_PUBLIC_BASE_PATH: /puzznic

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4