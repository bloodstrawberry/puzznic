name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn" # 💡 npm 대신 yarn 캐시를 사용하도록 변경

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: yarn install --immutable # 💡 npm ci 대신 yarn 명령어 사용

      - name: Build with Next.js
        run: yarn build # 💡 npm run build 대신 yarn build 사용
        env:
          NEXT_PUBLIC_BASE_PATH: /puzznic

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # 💡 next.config.js의 output: 'export' 결과물 경로

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4